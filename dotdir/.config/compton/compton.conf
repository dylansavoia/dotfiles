fading = true

fade-in-step=0.1
fade-out-step=0.1
fade-delta=22

shadow = true;

shadow-exclude = [
    "name ~= '^rofi'",
    "class_g = 'awesome'"
]

# The blur radius for shadows. (default 12)
shadow-radius = 10;

# The left offset for shadows. (default -15)
shadow-offset-x = -15;

# The top offset for shadows. (default -15)
shadow-offset-y = -15;

# The translucency for shadows. (default .75)
shadow-opacity = 0.75;
